<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conciliador · Convenio Brilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: 'Manrope', system-ui, sans-serif; background: #f5f1e8; }
    .font-serif { font-family: 'Fraunces', Georgia, serif; }
    .font-mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .__splash, .__error { display:flex; align-items:center; justify-content:center;
                          min-height:100vh; padding:2rem; text-align:center;
                          font-size:14px; color:#78716c; }
    .__error { color:#991b1b; background:#fef2f2; }
    .__error pre { font-family: 'JetBrains Mono', monospace; font-size:12px;
                   text-align:left; max-width:800px; white-space:pre-wrap;
                   background:#fff; padding:1rem; border:1px solid #fecaca;
                   border-radius:4px; margin-top:1rem; }
  </style>
</head>
<body>
  <div id="root">
    <div class="__splash">
      <div>
        <div style="font-family:'Fraunces',serif; font-size:24px; color:#1c1917; margin-bottom:8px;">Conciliador Brilla</div>
        <div>Cargando…</div>
        <noscript style="display:block; margin-top:1rem; color:#991b1b;">
          Esta aplicación requiere JavaScript habilitado.
        </noscript>
      </div>
    </div>
  </div>

  <!-- Reportar errores de carga visibles -->
  <script>
    window.__handleAppError = function(msg, err) {
      var root = document.getElementById('root');
      if (!root) return;
      var pre = err && (err.stack || err.message || String(err)) || '';
      root.innerHTML = '<div class="__error"><div>' +
        '<div style="font-family:\'Fraunces\',serif; font-size:22px; margin-bottom:8px;">Error al iniciar</div>' +
        '<div>' + msg + '</div>' +
        (pre ? '<pre>' + pre.replace(/[<>&]/g, function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];}) + '</pre>' : '') +
        '<div style="margin-top:1rem; font-size:12px;">Verifica tu conexión a internet y recarga la página.</div>' +
      '</div></div>';
    };
    window.addEventListener('error', function(e) {
      window.__handleAppError('Se produjo un error de JavaScript.', e.error || e.message);
    });
    // Timeout: si en 10s no se montó, avisar
    setTimeout(function() {
      var splash = document.querySelector('.__splash');
      if (splash) window.__handleAppError(
        'La carga está tomando demasiado tiempo. Verifica tu conexión a internet.',
        null
      );
    }, 10000);
  </script>

  <!-- Dependencias (orden importa) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
