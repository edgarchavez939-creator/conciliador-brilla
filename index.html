        if (window.React && window.ReactDOM && window.lucide && window.XLSX && window.pdfjsLib) {
          try {
            window.__runApp();
          } catch (err) {
            window.__handleAppError('Error al ejecutar la aplicación.', err);
          }
        } else if (attempts >= maxAttempts) {
          var faltan = [];
          if (!window.React) faltan.push('React');
          if (!window.ReactDOM) faltan.push('ReactDOM');
          if (!window.lucide) faltan.push('Lucide');
          if (!window.XLSX) faltan.push('SheetJS');
          if (!window.pdfjsLib) faltan.push('pdf.js');
          window.__handleAppError(
            'No se pudieron cargar todas las dependencias: ' + faltan.join(', ') + '. Recarga la página.',
            null
          );
        } else {
          setTimeout(check, 100);
        }
      }
      check();
    })();
  </script>
</body>
</html>
